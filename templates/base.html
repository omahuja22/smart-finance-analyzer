<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Smart Finance Analyzer{% endblock %}</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }

    .navbar {
      background-color: #0f172a;
    }

    .navbar-brand,
    .nav-link {
      color: #ffffff !important;
      font-weight: 500;
    }

    .nav-link:hover {
      opacity: 0.85;
    }

    .container {
      max-width: 1200px;
    }

    .card {
      border-radius: 12px;
      border: none;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    h5, h6 {
      font-weight: 600;
    }

    .btn-primary {
      background-color: #2563eb;
      border: none;
    }

    .btn-success {
      background-color: #16a34a;
      border: none;
    }

    .btn-warning {
      background-color: #f59e0b;
      border: none;
      color: #0f172a;
    }

    .btn-danger {
      background-color: #dc2626;
      border: none;
    }

    footer {
      margin-top: 60px;
      padding: 20px 0;
      text-align: center;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">Smart Finance Analyzer</a>

    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav">

        {% if current_user.is_authenticated %}
        <li class="nav-item">
          <a class="nav-link" href="/dashboard">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/logout">Logout</a>
        </li>
        {% else %}
        <li class="nav-item">
          <a class="nav-link" href="/login">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/register">Register</a>
        </li>
        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container my-5">
  {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer>
  © {{ 2025 }} Smart Finance Analyzer • Built with Flask & ML
</footer>

</body>
</html>
